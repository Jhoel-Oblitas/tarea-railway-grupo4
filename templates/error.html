<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - NEXUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl p-10 w-full max-w-md text-center relative overflow-hidden">
        <div class="relative z-10">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-100 text-red-600 mb-6">
                <i class="fas fa-exclamation-triangle text-3xl"></i>
            </div>
            <h1 class="text-4xl font-bold text-gray-900 tracking-tight mb-2">¡Ups! Algo salió mal</h1>
            <p class="text-gray-500 mb-6">Ha ocurrido un error en la solicitud.</p>
            
            <div class="bg-gray-50 rounded-xl p-4 mb-8 text-left border border-gray-100">
                <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Detalle del Error</p>
                <p class="text-sm font-medium text-gray-700 break-words">{{ detail if detail else "Error desconocido o recurso no encontrado." }}</p>
            </div>

            <div class="space-y-3">
                <a href="/" class="w-full inline-flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                    <i class="fas fa-home mr-2"></i> Ir al Dashboard
                </a>
                <a href="javascript:history.back()" class="w-full inline-flex justify-center items-center py-3 px-4 border border-gray-300 rounded-xl shadow-sm text-sm font-semibold text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i> Volver Atrás
                </a>
            </div>
        </div>
    </div>
</body>
</html>
